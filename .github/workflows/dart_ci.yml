name: Dart CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git checkout
        uses: actions/checkout@v4

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: 📦 Install dependencies
        run: |
          dart pub get
          dart pub global activate very_good_cli

      - name: 🗂️ Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: 🔍 Analyze
        run: dart analyze

      - name: 🧪 Test
        run: dart pub global run very_good_cli:very_good dart test --coverage --min-coverage=100 --test-randomize-ordering-seed=random
